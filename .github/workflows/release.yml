name: Build/release

on:
  release:
    types: [published]

jobs:
  release:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    continue-on-error: false

    permissions:
      contents: write

    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v7

      - name: Install Node.js, NPM
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"

      - name: Install X11 Build Dependencies (Linux Only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxtst-dev libxt-dev libxinerama-dev libx11-xcb-dev libxkbcommon-dev libxkbcommon-x11-dev libxkbfile-dev libxrandr-dev

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run make

      - name: Update Release with Files
        id: create_version_release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true # Set this to false if you want to prevent updating existing releases
          name: ${{ github.event.release.name }}
          prerelease: ${{ github.event.release.prerelease }}
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: "out/make/**/*.exe, out/make/**/*.deb, out/make/**/*.rpm, out/make/**/*.zip"
          tag: ${{ github.event.release.tag_name }}
          body: ${{ github.event.release.body }}
