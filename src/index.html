<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Input Overlay</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <!-- Preset sprite canvas – absolute-positioned, fills the window when active -->
    <canvas id="overlay-canvas"></canvas>

    <!-- Legacy div-based overlay – used when no preset is configured -->
    <div class="box-container"></div>
    <div class="mouse">
      <div class="row">
        <div id="key-leftmousebutton"></div>
        <div id="key-rightmousebutton"></div>
      </div>
      <div class="row">
        <div id="mousebody"></div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
